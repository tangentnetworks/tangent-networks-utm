# ============================================================
# security.conf - TNSecurity Suite Configuration
# ============================================================
# Central configuration for all security features.
# Location: /var/www/htdocs/tn/data/config/security.conf
#
# AUTHOR: David Peter, Tangent Networks
# VERSION: 2.0.0
# ============================================================

# ============================================================
# DEVELOPMENT MODE
# ============================================================
# DEVEL = 1 : Development mode (all security bypassed)
# DEVEL = 0 : Production mode (full security enabled)
#
# WARNING: NEVER deploy with DEVEL = 1 in production!
# ============================================================
[mode]
DEVEL = 0
DEVEL_PASSWORD = Developer2026#

# ============================================================
# SECURITY FEATURES
# ============================================================
# Individual feature toggles (only apply when DEVEL = 0)
# ============================================================
[security]
ENABLE_CSRF = 1
ENABLE_SRI = 1
ENABLE_RATE_LIMIT = 1
ENABLE_SESSION_CHECK = 1
ENABLE_ORIGIN_CHECK = 1
ENABLE_DOWNLOAD_PROTECTION = 1

# ============================================================
# RATE LIMITING
# ============================================================
[rate_limit]
MAX_REQUESTS_PER_MINUTE = 60
MAX_LOGIN_ATTEMPTS = 5
MAX_REGISTER_ATTEMPTS = 3
MAX_RESET_ATTEMPTS = 3
LOCKOUT_DURATION = 1800
CLEANUP_INTERVAL = 3600

# ============================================================
# SESSION MANAGEMENT
# ============================================================
[session]
SESSION_LIFETIME = 7200
SESSION_COOKIE_NAME = tn_session
SESSION_SECURE = 0
SESSION_HTTPONLY = 1
SESSION_SAMESITE = Strict

# ============================================================
# CSRF PROTECTION
# ============================================================
[csrf]
TOKEN_LENGTH = 64
TOKEN_LIFETIME = 3600
TOKEN_REFRESH_INTERVAL = 1800

# ============================================================
# LOGGING
# ============================================================
[logging]
LOG_LEVEL = debug
LOG_TO_FILE = 1
LOG_TO_SYSLOG = 1
LOG_FILE = /var/www/htdocs/tn/data/logs/csp/websec.log

# ============================================================
# DATABASE
# ============================================================
[database]
DB_PATH = /var/www/htdocs/tn/data/db/auth.db

# ============================================================
# PATHS (Relative to application root)
# ============================================================
[paths]
SESSION_KEY_FILE = data/run/session/session.key
HMAC_KEY_FILE = data/run/session/hmac.key
LOG_DIR = data/logs/csp

# ============================================================
# NOTES
# ============================================================
# To enable DEVEL mode:
#   1. Set DEVEL = 1
#   2. Restart web server: rcctl restart httpd slowcgi
#   3. All security checks will be bypassed
#
# To disable DEVEL mode:
#   1. Set DEVEL = 0
#   2. Restart web server: rcctl restart httpd slowcgi
#   3. Full security enforcement active
#
# DEVEL mode indicators:
#   - Yellow warning banner in web UI
#   - Console logs show "DEVEL MODE"
#   - All security checks return success
#   - Magic password "DEVEL_BYPASS" works for login
# ============================================================
