# ============================================================================
# Integrity Checks Configuration
# ============================================================================
# Format: type|check_name|display_name|path|description|excludes
#
# type:         'dir'  - Monitor entire directory (recursive)
#               'file' - Monitor individual file
#
# check_name:   Short identifier (used in API, filenames, logs)
# display_name: Human-readable name (shown in UI card)
# path:         Full path to directory or file
# description:  Brief description (shown in UI card)
# excludes:     Optional comma-separated glob patterns to exclude
#
# NOTES:
# - Lines starting with # are comments; blank lines are ignored
# - Paths that don't exist are skipped with a warning
# - Directory checks are recursive
# - The UI shows one card per dir check; individual file checks appear
#   in the accordion detail view only
# ============================================================================

# ============================================================================
# TANGENT NETWORKS CORE COMPONENTS
# ============================================================================
dir|assets|Web Assets|/var/www/htdocs/tn/assets|JavaScript and CSS files|
dir|cgi|CGI Scripts|/var/www/htdocs/tn/cgi-bin|Perl CGI endpoints|
dir|config|Configuration|/var/www/htdocs/tn/data/config|Security configuration files|
dir|keys|Encryption Keys|/var/www/htdocs/tn/data/keys|HMAC and session keys|
dir|lib|Perl Modules|/var/www/htdocs/tn/data/lib|Security modules (TN*.pm)|

# ============================================================================
# SYSTEM CONFIGURATION
# Blanket /etc and /usr/local/etc coverage.
# Excludes:
#   master.passwd           -- changes on user operations
#   passwd                  -- shadow of master.passwd
#   random.seed             -- regenerated on every boot by design
#   /pf/feeds/              -- hourly external threat intel blocklist updates
#   /pf/user/               -- operator-managed custom blocklists (live updates)
#   /e2guardian/lists/      -- E2Guardian threat intel feeds (domains/URLs/IPs)
# Note: path-based excludes use /regex/ syntax matched against full filepath.
# ============================================================================
dir|etc|System Configuration|/etc|All system configuration files|master.passwd,passwd,random.seed,/\/pf\/feeds\//,/\/pf\/user\//,/\/e2guardian\/lists\//,/\/examples\//,/\/snort\/rules\//,/\/feeds\//
dir|usr_local_etc|Package Configuration|/usr/local/etc|Third-party package configuration files|

# ============================================================================
# SYSTEM BINARIES
# ============================================================================
dir|usr_bin|User Binaries|/usr/bin|Standard user commands and utilities|*.old,*.backup,*~
dir|usr_sbin|System Binaries|/usr/sbin|Essential system administration binaries|*.old,*.backup,*~
dir|usr_libexec|System Utilities|/usr/libexec|Internal binaries run by other programs|*.old,*.backup,*~
dir|local_bin|Local Binaries|/usr/local/bin|User-installed executables and scripts|*.old,*.backup,*~
dir|sbin|System Scripts|/usr/local/sbin|Service management and monitoring scripts|*.old,*.backup,*~

# ============================================================================
# LIBRARIES
# Useful post-sysupgrade: verify base and port libraries match expected state.
# ============================================================================
dir|usr_lib|Base System Libraries|/usr/lib|Base system shared libraries|
dir|usr_local_lib|Package Libraries|/usr/local/lib|Third-party package shared libraries|

# ============================================================================
# DEVELOPMENT HEADERS
# ============================================================================
dir|usr_include|System Headers|/usr/include|System-wide C header files|
dir|usr_local_include|Package Headers|/usr/local/include|Third-party C header files|

# ============================================================================
# PACKAGE DATABASE
# ============================================================================
dir|pkg|Package Database|/var/db/pkg|Metadata for all installed packages|

# ============================================================================
# NETWORK SECURITY
# ============================================================================
#dir|ssh|SSH Config|/etc/ssh|SSH server and client configuration|
#dir|ssl|SSL Certificates|/etc/ssl|SSL/TLS certificates and keys|
#dir|e2guardian|E2Guardian|/etc/e2guardian|E2Guardian content filtering config|/\/lists\//

# ============================================================================
# MONITORING AND AUDIT
# ============================================================================
#dir|tn_audit|TNAudit|/etc/TNAudit|TNAudit configuration|
#dir|etc_pmacct|PMACCT Config|/etc/pmacct|Passive network monitoring configuration|

# ============================================================================
# DNS
# /var/unbound is chrooted
# ============================================================================
#file|unbound_conf|DNS Resolver|/var/unbound/etc/unbound.conf|Unbound DNS resolver configuration|
dir|var_unbound|DNS|/var/unbound|Caching DNS resolver|

