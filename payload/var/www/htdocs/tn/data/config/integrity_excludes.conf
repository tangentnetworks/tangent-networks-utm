# ============================================================================
# Global Integrity Check Excludes
# ============================================================================
# Patterns listed here will be excluded from ALL integrity checks
# Use for temporary files, backups, and editor artifacts
# Note: OpenBSD mtree doesn't support -X flag, so these are currently not used
#       but are documented for future post-processing filtering
# ============================================================================

# Editor temporary files
*~
*.swp
*.swo
.*.swp
.*.swo

# Backup files (standard patterns)
*.backup
*.bak
*.old
*.orig
*.save
*-BackUp
*-last
*-bak
*-Bak
*-orig

# Backup files (date-stamped: file-YYYY-MM-DD pattern)
*-[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]
*-[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]-[0-9]
*-[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]-[0-9][0-9]

# Version control
.git
.gitignore
.svn
CVS

# Logs and temporary data
*.log
*.tmp
*.temp
.DS_Store
Thumbs.db

# Development artifacts
*.pyc
*.pyo
__pycache__
node_modules
.cache

# ============================================================================
# OpenBSD-specific exclusions
# ============================================================================

# Runtime state files - change on every boot or daemon activity
*.pid
*.lock
*.sock
*.socket

# Kernel and runtime generated
*.core
*.core.*

# Package manager working files under /var/db/pkg
# These metadata files update on every pkg_add/delete operation.
+CONTENTS
+DESC
+COMMENT
+INSTALL
+DEINSTALL
+REQUIRE
+REQUIRED_BY
+DISPLAY
+MTREE_DIRS

# SSH private host keys - never hash private key material into a
# world-accessible SQLite database. Monitor public keys and config only.
ssh_host_rsa_key
ssh_host_ecdsa_key
ssh_host_ed25519_key
ssh_host_dsa_key

# SSL/TLS private keys - same concern as SSH keys above.
# Public certs (.crt, .pem read-only) are safe to monitor.
*.key
private

# OpenBSD shadow password file - contains hashed passwords.
# /etc/passwd (no dot prefix) is safe to monitor.
master.passwd
spwd.db
pwd.db

# Snort dynamic shared objects and preproc - updated by oinkmaster.
# Monitor the conf files, not the binary rule objects.
*.so
*.so.*
dynamic_rules
dynamic_preproc

# ClamAV signature databases - updated by freshclam on schedule.
# Monitor freshclam.conf and clamd.conf, not the databases.
*.cvd
*.cld
*.hdb
*.hdu
*.mdb
*.mdu
*.ndb
*.ndu
*.fp
daily.cvd
main.cvd
bytecode.cvd

# RRD databases - change continuously by design
*.rrd

# Temporary queue and spool files
*.queue
*.spool

# E2Guardian content filter lists - path-based exclusion note:
# The global excludes file matches on bare filenames only. To exclude
# everything inside /etc/e2guardian/lists/ use the regex pattern type
# in the e2guardian check's excludes column in integrity_checks.conf:
#   /\/lists\//
# This is already set in the e2guardian check definition below.
