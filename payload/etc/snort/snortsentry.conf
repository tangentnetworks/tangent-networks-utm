# snortsentry.conf - Configuration file for snortsentry v8.1.6
# Use full paths for all file definitions.

###########################################################

# 1. CORE FILES AND DAEMON SETTINGS

###########################################################

# Path to the Snort alert file in 'fast' format.
AlertFile /var/www/htdocs/tn/data/logs/snort/alert.log

# Path to the PID file for the daemon process.
PidFile /var/www/htdocs/tn/data/run/snortsentry/snortsentry.pid

# Path to the lock file to ensure only one instance runs.
LockFile /var/www/htdocs/tn/data/run/snortsentry/snortsentry.lock

# Path for the state file (saves blocked IPs across restarts).
StateFile /var/www/htdocs/tn/data/db/snortsentry/snortsentry.state

# Optional file for verbose logging. If not set, logs go to syslog in daemon mode.
# LogFile /var/log/snortsentry.log

# Run interval: how often to check the alert file (in seconds).
CheckInterval 1

# Batch interval: how often to apply pending blocks to PF (in seconds).
# This prevents excessive pfctl calls.
BatchInterval 5

# Set to 'no' to run in the foreground (useful for debugging).
# Daemon yes

# Log level: debug, info, warn, or error.
LogLevel info

###########################################################

# 2. PACKET FILTER (PF) CONFIGURATION

###########################################################

# The name of the PF table used to store malicious IP addresses.
# MUST be unique if you have other dynamic tables.

PfTable snort_block

# The name of the PF anchor.
# Must be loaded in your main /etc/pf.conf (e.g., anchor "my_snort_anchor" all).
PfAnchor snortsentry

# UseAnchor [yes|no]
# Controls how the script interacts with PF:

# 1. UseAnchor yes (Default) - Anchor Mode:
# The script creates the 'PfAnchor' and the blocking rule within it.
# You MUST ensure 'PfAnchor' is loaded in your main pf.conf.

# 2. UseAnchor no - Table Only Mode (Recommended to avoid anchor conflicts):
# The script ONLY manages IP addresses in 'PfTable'.
# You MUST manually define the blocking rule in your main /etc/pf.conf:

# table <snort_block> persist
# block drop quick from <snort_block> to any

UseAnchor no

###########################################################

# 3. BLOCKING LOGIC

###########################################################

# Maximum Snort priority to block (1 is the highest).
# If Keywords are defined, the alert must also match a Keyword REGEX.
Priority 1

# Default duration for an initial block (in seconds).
BlockDuration 60

# Max duration a block can escalate to (in seconds). Default 1 day.
MaxBlockDuration 86400

# Maximum number of concurrent IPs to block. Prevents resource exhaustion.
MaxBlocks 10000

# If set to 'yes', removes all IPs from the PfTable when snortsentry exits gracefully.
UnblockOnExit no

###########################################################

# 4. ESCALATION & WHITELISTING

###########################################################

# Enable automatic block duration escalation.
EnableEscalation yes

# A comma or space-separated list of durations for escalation tiers (in seconds).
# When an IP is seen again, the block duration is extended to the next tier.
EscalationTiers 60, 300, 1800, 3600

# Automatically add RFC1918 (private) and link-local addresses to the whitelist.
AutoWhitelistRFC1918 yes

# List of IP/CIDR ranges to never block (space or comma separated).
# Example: Whitelist 192.168.1.0/24 10.0.0.5 2001:db8::/64
Whitelist 192.168.122.0/24 10.10.10.0/24 172.16.10.0/24

# Keywords are case-insensitive Regular Expressions (regex) applied to the Snort message.
# If ANY Keyword is defined, an alert MUST match one of them to be blocked.
# If NO Keyword is defined, all alerts meeting the 'Priority' threshold are blocked.
# Example: Block only alerts matching 'Portscan' or 'DoS' REGEX.
# Keyword "Portscan"
# Keyword "DoS|Flood"
# Keyword "SSH" excludes a specific IP:
# Keyword "SSH" !10.10.10.5
