# /etc/sysctl.conf
# OpenBSD Router — Tangent Networks
# Hardware target: RPi 5 8GB / x86 Pentium 8GB
# Last updated: 2026-02-16
#
# NOTE: kern.maxclusters and tcp.recvspace/sendspace do not exist
# on OpenBSD — buffer sizing is handled by PF and socket options.
# Values here are ground-truth verified against running system.

# ============================================
# KERNEL LIMITS
# ============================================
kern.maxfiles=65536
kern.maxproc=8192

# ============================================
# NETWORK MEMORY
# kern.maxclusters = (8GB * 0.25) / 4096 = 524288
# Doubles the default 262144 for 8GB RAM
# For 4GB (QEMU/Atom): keep at 262144
# ============================================
kern.maxclusters=65536

# ============================================
# IP FORWARDING (router mode)
# ============================================
net.inet.ip.forwarding=1
net.inet6.ip6.forwarding=1

# ============================================
# TCP TUNING
# ============================================
net.inet.tcp.mssdflt=1460           # standard MTU optimization
net.inet.tcp.always_keepalive=1     # detect dead connections
net.inet.tcp.synuselimit=500000     # SYN cache size
net.inet.tcp.synhashsize=1024       # SYN hash buckets
net.inet.tcp.ecn=1                  # explicit congestion notification (was 0)
net.inet.tcp.ackonpush=1            # immediate ACK on PSH (was 0, better for SSH/DNS)
net.inet.tcp.rstppslimit=200        # RST rate limit, SYN flood mitigation

# Keepalive tuning — router sees many short-lived connections
# Defaults are far too long for a router (keepidle=7200 = 2hrs)
net.inet.tcp.keepidle=300           # detect dead connections in 5min (was 7200)
net.inet.tcp.keepinittime=30        # drop half-open SYNs in 30s (was 75)
net.inet.tcp.keepintvl=10           # probe every 10s once keepalive starts (was 75)

# ============================================
# UDP TUNING (Unbound DNS — high query volume)
# ============================================
net.inet.udp.recvspace=1048576
net.inet.udp.sendspace=262144

# ============================================
# BPF CAPTURE BUFFER
# pflog0 (blocks) + pflog1 (all traffic via pmacct)
# 32KB default causes mbuf denials under load
# ============================================
net.bpf.bufsize=2097152
net.bpf.maxbufsize=2097152

# ============================================
# SHARED MEMORY (e2guardian)
# ============================================
kern.shminfo.shmmax=536870912       # 512MB
kern.shminfo.shmall=131072          # pages
kern.shminfo.shmmni=128             # segments

# ============================================
# SEMAPHORES
# ============================================
kern.seminfo.semmni=128
kern.seminfo.semmns=1024
kern.seminfo.semmnu=256
kern.seminfo.semopm=100

