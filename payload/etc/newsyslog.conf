#       $OpenBSD: newsyslog.conf,v 1.38 2022/01/05 18:34:23 deraadt Exp $
#
# configuration file for newsyslog
# Post-rotation hook: /usr/local/sbin/logrotate_rename.sh renames .0 -> _YYYY-MM-DD.log
#
# NOTE: Most logs are rotated by tangent_logrotate.sh (@reboot + every 20min)
#       These entries serve as MANUAL FALLBACK ONLY (no automatic scheduling)
#
# Format: logfile_name [owner:group] mode count size when flags [/pid_file] [sig_num] [command]

# System logs - NO SCHEDULED ROTATION (remove @T00, keep size limit only)
/var/cron/log           root:wheel      600  7     10    *     Z 
/var/log/authlog        root:wheel      640  7     *     *     Z 
/var/log/maillog        root:wheel      640  7     *     *     Z 
/var/log/secure         root:wheel      600  7     *     *     Z 
/var/log/pflog          root:wheel      600  7     250   @T10  ZB "pkill -HUP -u root -U root -t - -x pflogd"

# pflog - EXCLUDED (handled separately via pflogrotate/%%INT_IF%%)

# Custom system logs (messages, daemon) - web-accessible location
/var/www/htdocs/tn/data/logs/system/messages		root:wheel  644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/system/messages"
/var/www/htdocs/tn/data/logs/system/daemon		root:wheel  644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/system/daemon"

# Long-term retention logs (do not rotate)
/var/log/wtmp           root:wheel      644  99    *    $M1D4 B ""
/var/log/lastlog        root:wheel      644  99    *    $M1D4 B ""

# querunner
/var/log/queue_processor.log	root:wheel	644  1  * * Z


# Application/Service Logs - NO SCHEDULED ROTATION (tangent_logrotate.sh handles it)
/var/www/htdocs/tn/data/logs/doas/doas.log                          644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/doas/doas.log"
/var/www/htdocs/tn/data/logs/dhcpd/dhcpd.log                        644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/dhcpd/dhcpd.log"
/var/www/htdocs/tn/data/logs/unbound/unbound.log                    644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/unbound/unbound.log"
/var/www/htdocs/tn/data/logs/rad/rad.log                            644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/rad/rad.log"
/var/www/htdocs/tn/data/logs/collectd/collectd.log                  644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/collectd/collectd.log"
/var/www/htdocs/tn/data/logs/sslproxy/sslproxy.log                  644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/sslproxy/sslproxy.log"
/var/www/htdocs/tn/data/logs/sslproxy/sslproxy_connect.log          644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/sslproxy/sslproxy_connect.log"
/var/www/htdocs/tn/data/logs/sockd/sockd.log                        644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/sockd/sockd.log"
/var/www/htdocs/tn/data/logs/p3scan/p3scan.log                      644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/p3scan/p3scan.log"
/var/www/htdocs/tn/data/logs/smtp-gated/smtp-gated.log              644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/smtp-gated/smtp-gated.log"
/var/www/htdocs/tn/data/logs/spamd/spamd.log                        644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/spamd/spamd.log"
/var/www/htdocs/tn/data/logs/snort/alert.log                        644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/snort/alert.log"
/var/www/htdocs/tn/data/logs/snort/snort.log                        644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/snort/snort.log"
/var/www/htdocs/tn/data/logs/snort/snortinline.log                  644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/snort/snortinline.log"
/var/www/htdocs/tn/data/logs/snortsentry/snortsentry.log            644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/snortsentry/snortsentry.log"
/var/www/htdocs/tn/data/logs/e2guardian/access.log                  644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/e2guardian/access.log"
/var/www/htdocs/tn/data/logs/e2guardian/e2guardian.log              644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/e2guardian/e2guardian.log"
/var/www/htdocs/tn/data/logs/httpd/httpd_access.log                 644  7  *  *  Z "pkill -USR1 -u root -U root -x httpd; /usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/httpd/httpd_access.log"
/var/www/htdocs/tn/data/logs/httpd/httpd_error.log                  644  7  *  *  Z "pkill -USR1 -u root -U root -x httpd; /usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/httpd/httpd_error.log"
/var/www/htdocs/tn/data/logs/pmacct/pmacct.log                      644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/pmacct/pmacct.log"
/var/www/htdocs/tn/data/logs/imspector/imspector.log                644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/imspector/imspector.log"
/var/www/htdocs/tn/data/logs/ftp-proxy/ftp-proxy.log                644  7  *  *  Z "/usr/local/sbin/logrotate_rename.sh /var/www/htdocs/tn/data/logs/ftp-proxy/ftp-proxy.log"

# MFS %%INT_IF%% tcpdump (KEEPS scheduled rotation)
/var/www/htdocs/tn/data/logs/pf/%%INT_IF%%.log                      www:wheel       644  0     64000         *    Z "" "/usr/local/sbin/pf-tcpdump.sh"

# MFS pmacct json for $ext_if $int_if (KEEPS scheduled rotation)
/var/www/htdocs/tn/data/pipes/pmacct/ext_if_json.log            www:wheel       644  0     16000 *    Z /var/www/htdocs/tn/data/run/pmacct/pmacct-ext_if_json_mfs.pid  SIGHUP
/var/www/htdocs/tn/data/pipes/pmacct/int_if_json.log            www:wheel       644  0     16000 *    Z /var/www/htdocs/tn/data/run/pmacct/pmacct-int_if_json_mfs.pid  SIGHUP
