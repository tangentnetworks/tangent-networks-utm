## /etc/sockd.conf -- Dante SOCKS5 Server -- Tangent Networks UTM
## Canonical template; all values supplied by TN_SUBSTITUTE.sh
## Tokens: %%INT_IP4%%, %%INT_IP6%%, %%INT_NET4%%, %%INT_NET6%%, %%EXT_IF%%
##
## NOTE: "to: 0/0" in pass rules is intentional. Dante selects the outbound
## address family based on EXT_IF availability. Using "::/0" locks the
## destination to IPv6 and breaks NAT64-synthesised (64:ff9b::) destinations.
##
## SYNTAX NOTE: Dante does not use semicolons as statement terminators.
## Each directive must be on its own line. A semicolon inside a rule block
## causes a parse error. Do NOT add semicolons anywhere in this file.
logoutput: /var/www/htdocs/tn/data/logs/sockd/sockd.log
internal: %%INT_IP4%% port = 1080
internal: %%INT_IP6%% port = 1080
external: %%EXT_IF%%
socksmethod: none
user.notprivileged: _sockd
timeout.connect:      30
timeout.io:           86400
timeout.tcp_fin_wait: 10
# Allow LAN clients
client pass {
    from: %%INT_NET4%% to: 0/0
    log: connect disconnect error
}
client pass {
    from: %%INT_NET6%% to: 0/0
    log: connect disconnect error
}
# Block everything else at the client level
client block {
    from: 0/0 to: 0/0
    log: connect error
}
# Block loopback
socks block {
    from: 0/0 to: 127.0.0.0/8
    log: connect error
}
socks block {
    from: 0/0 to: ::1/128
    log: connect error
}
# Block RFC1918 private ranges
socks block {
    from: 0/0 to: 10.0.0.0/8
    log: connect error
}
socks block {
    from: 0/0 to: 172.16.0.0/12
    log: connect error
}
socks block {
    from: 0/0 to: 192.168.0.0/16
    log: connect error
}
# Block ULA and link-local IPv6
socks block {
    from: 0/0 to: fc00::/7
    log: connect error
}
socks block {
    from: 0/0 to: fe80::/10
    log: connect error
}
# Block multicast
socks block {
    from: 0/0 to: 224.0.0.0/4
    log: connect error
}
socks block {
    from: 0/0 to: ff00::/8
    log: connect error
}
# Block privileged port binding
socks block {
    from: 0/0 to: 0/0 port le 1023
    command: bind
    log: connect error
}
# Block abuse-prone service ports
socks block {
    from: 0/0 to: 0/0 port = 25
    log: connect error
}
socks block {
    from: 0/0 to: 0/0 port = 445
    log: connect error
}
socks block {
    from: 0/0 to: 0/0 port = 3389
    log: connect error
}
socks block {
    from: 0/0 to: 0/0 port = 9050
    log: connect error
}
# Block UDP tunnelling
socks block {
    from: 0/0 to: 0/0
    protocol: udp
    log: connect error
}
# Allow LAN TCP CONNECT outbound
socks pass {
    from: %%INT_NET4%% to: 0/0
    command: connect
    protocol: tcp
    log: connect disconnect iooperation
}
socks pass {
    from: %%INT_NET6%% to: 0/0
    command: connect
    protocol: tcp
    log: connect disconnect iooperation
}
