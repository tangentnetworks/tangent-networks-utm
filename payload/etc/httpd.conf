# /etc/httpd.conf
# Tangent Networks - Hardened Configuration
# All traffic routed through router.pl (TNWAF)
#
# TOKENS (substituted by TN_PKG_INSTALL.sh at deploy time):
#   %%INT_IP4%%   -- internal interface IP (e.g. %%INT_IP4%%)
#   /etc/ssl/firewall.local.crt  -- path to TLS certificate (from TLS_CERT in tn-interfaces)
#   /etc/ssl/private/firewall.local.key   -- path to TLS private key  (from TLS_KEY  in tn-interfaces)

# =============================================
# Global types definition
# =============================================

types {
        include "/usr/share/misc/mime.types"
        application/x-x509-ca-cert          crt pem
        text/css                            css
        text/html                           html htm
        application/javascript              js
        application/json                    json metrics
        text/plain                          txt status
        image/png                           png
        image/jpeg                          jpg jpeg
        image/x-icon                        ico
        image/svg+xml                       svg
}

# =============================================
# HTTP - Redirect all to HTTPS
# =============================================

server "%%INT_IP4%%" {
    listen on * port 80

    location "/certs/*" {
        root "/htdocs/tn"
    }

    location "/*" {
        block return 301 "https://$SERVER_NAME$REQUEST_URI"
    }
}

# =============================================
# HTTPS - All traffic via router.pl (TNWAF)
# =============================================
server "%%INT_IP4%%" {
    listen on * tls port 443

    tls {
        certificate "/etc/ssl/firewall.local.crt"
        key         "/etc/ssl/private/firewall.local.key"
        protocols "tlsv1.2, tlsv1.3"
        ciphers "HIGH:!aNULL"
    }

    root "/htdocs/tn"
    directory index "index.html"
    log syslog

    # Powerstate page served directly, no fastcgi
    location "/maintenance.html" {
        root "/htdocs/tn"
    }

    # Serve self-signed CA cert for client import; static, no FastCGI
    location "/certs/*" {
        root "/htdocs/tn"
    }

    # Block subdirectories that contain secrets; defence-in-depth alongside TNWAF.
    location "/data/db/GeoIP/*" {
        fastcgi socket "/run/slowcgi.sock"
        request rewrite "/cgi-bin/router.pl"
    }
    location "/data/db/pf/*" {
        fastcgi socket "/run/slowcgi.sock"
        request rewrite "/cgi-bin/router.pl"
    }
    location "/data/db/unbound/*" {
        fastcgi socket "/run/slowcgi.sock"
        request rewrite "/cgi-bin/router.pl"
    }
    location "/data/db/e2g/*" {
        fastcgi socket "/run/slowcgi.sock"
        request rewrite "/cgi-bin/router.pl"
    }

    location "/data/db/TNAuditFilesList.json" {
        fastcgi socket "/run/slowcgi.sock"
        request rewrite "/cgi-bin/router.pl"
    }

    # Block db/ root -- SQLite .db, WAL, SHM files must never be served
    location "/data/db/*"               { block return 403 }
    location "/data/keys/*"             { block return 403 }
    location "/data/config/*"           { block return 403 }
    location "/data/lib/*"              { block return 403 }
    location "/data/scripts/*"          { block return 403 }
    location "/data/session/*"          { block return 403 }
    location "/data/run/*"              { block return 403 }
    location "/data/queue/*"            { block return 403 }

    # Everything else goes through router.pl (TNWAF)
    location "/*" {
        fastcgi socket "/run/slowcgi.sock"
        request rewrite "/cgi-bin/router.pl"
    }
}
