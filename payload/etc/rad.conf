## /etc/rad.conf -- Tangent Networks UTM IPv6 Router Advertisement Daemon
## Canonical template; all values supplied by TN_SUBSTITUTE.sh
## Tokens:
##   %INT_IF%      LAN interface name       (e.g. vio1)
##   %INT_NET6%    LAN IPv6 /64 prefix      (e.g. fdac:1019::/64)
##   %INT_IP6%     LAN IPv6 gateway address (e.g. fdac:1019::1)
##   %NAT64_PFX%   NAT64 well-known prefix  (e.g. 64:ff9b::/96)
## Constants:
##   mtu 1472   PPPoE-safe MTU -- identical on all deployments
interface %%INT_IF%% {
	default router yes
	prefix %%INT_NET6%%
	mtu 1472
	dns {
		lifetime 604800
		nameserver %%INT_IP6%%
		search home.arpa
	}
}
nat64 prefix %%NAT64_PFX%%
