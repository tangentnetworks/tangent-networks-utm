#------------------------------------------------------------------------------------
# Global
#------------------------------------------------------------------------------------

BaseDir        "/var/www/htdocs/tn/data/rrd/collectd"
PIDFile        "/var/www/htdocs/tn/data/run/collectd/collectd.pid"
Hostname       "tangent"

#------------------------------------------------------------------------------------
# Plugins
#------------------------------------------------------------------------------------
AutoLoadPlugin false
Interval     10

#--------------------------------------------------------
# Syslog
#--------------------------------------------------------

LoadPlugin syslog
<Plugin syslog>
        LogLevel info
</Plugin>

#--------------------------------------------------------
# Aggregation (CPU)
#--------------------------------------------------------
LoadPlugin cpu

LoadPlugin aggregation
<Plugin aggregation>
  <Aggregation>
    Plugin "cpu"
    Type "cpu"
    GroupBy "Host"
    SetPlugin "cpu_avg"
    CalculateAverage true
  </Aggregation>
</Plugin>

#--------------------------------------------------------
# df
#--------------------------------------------------------

LoadPlugin df
<Plugin df>
       Device "/dev/sd0a"
       MountPoint "/"
       FSType "ffs"
       IgnoreSelected false
       LogOnce false
       ReportByDevice false
       ReportInodes false
       ValuesAbsolute true
       ValuesPercentage false
</Plugin>

#--------------------------------------------------------
# disk
#--------------------------------------------------------

LoadPlugin disk
<Plugin "disk">
    Disk "sd0"
    IgnoreSelected false
    UseBSDName true
</Plugin>

#--------------------------------------------------------
# interface
#--------------------------------------------------------

LoadPlugin interface
<Plugin interface>
       Interface "lo0"
       Interface "enc0"
       Interface "pflog0"
       IgnoreSelected true
</Plugin>

#--------------------------------------------------------
# load
#--------------------------------------------------------
LoadPlugin load

#--------------------------------------------------------
# memory
#--------------------------------------------------------
LoadPlugin memory

#--------------------------------------------------------
# pf
#--------------------------------------------------------
LoadPlugin pf

#--------------------------------------------------------
# ping
#--------------------------------------------------------

LoadPlugin ping
<Plugin ping>
        Host "%%WAN_GW4%%"
        Host "1.1.1.1"
</Plugin>

#--------------------------------------------------------
# processes
#--------------------------------------------------------

LoadPlugin processes
<Plugin "processes">
    Process "clamd"
    Process "freshclam"
    Process "cron"
    Process "dhcpd"
    Process "e2guardian"
    Process "ftpproxy"
    Process "httpd"
    Process "ntpd"
    Process "pflogd"
    Process "pmacctd"
    Process "smtp-gated"
    Process "smtpd"
    Process "snort"
    Process "snortsentry"
    Process "sockd"
    Process "spamd"
    Process "sslproxy"
    Process "p3scan"
    Process "unbound"
    process "sshd"
</Plugin>

#--------------------------------------------------------
# rrdtool
#--------------------------------------------------------
LoadPlugin rrdtool

#--------------------------------------------------------
# unixscok
#--------------------------------------------------------

LoadPlugin unixsock
<Plugin unixsock>
    SocketFile "/var/www/htdocs/tn/data/sockets/collectd/collectd.sock"
    SocketGroup "_collectd"
    SocketPerms "0774"
</Plugin>

#--------------------------------------------------------
# uptime
#--------------------------------------------------------

LoadPlugin uptime

#--------------------------------------------------------
# users
#--------------------------------------------------------

LoadPlugin users

#--------------------------------------------------------
# swap
#--------------------------------------------------------
LoadPlugin swap
<Plugin swap>
        ReportByDevice true
#        ReportBytes true
#        ValuesAbsolute true
#        ValuesPercentage false
#        ReportIO true
</Plugin>
