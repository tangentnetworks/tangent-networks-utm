# =============================================================================
# OpenBSD Router/Firewall  --  PF Ruleset
# TangentNet UTM  --  Full Critical Configuration
# =============================================================================
#
# Logging:
#   pflog0   --  blocked traffic only (persistent, low volume)
#   pflog1   --  all traffic on real interfaces (mfs tmpfs, 50MB via newsyslog)
#             loopback is NOT logged  --  proxy relay traffic has no security value
#
# Interfaces:
#   %%EXT_IF%%  = WAN (ext_if)   --  IPv4 via DHCP, IPv6 via SLAAC or DHCPv6-PD
#   %%INT_IF%%  = LAN (int_if)   --  %%INT_IP4%% + %%INT_IP6%%/64 (ULA)
#
# =============================================================================
# IPv6 ARCHITECTURE
# =============================================================================
#
# Full dual-stack UTM. Every IPv6 LAN flow receives the same inspection
# coverage as IPv4 flows. For IPv4-only proxy daemons (imspector, p3scan,
# smtp-gated), the UTM implements an automated protocol-normalization
# architecture. IPv6 traffic is bridged via relayd(8) or SSLproxy to
# local loopback listeners (::1), where it is terminated and re-originated
# as IPv4 for the internal inspection daemons. ClamAV is natively
# dual-stack and handles ::1 connections directly.
#
# SSLproxy acts as the IPv6/IPv4 protocol boundary. IPv6 flows are diverted
# to SSLproxy's ::1 listeners via divert-to lo (dual-stack, single rule per
# protocol). SSLproxy decrypts, inspects, and re-originates traffic as IPv4
# on loopback. All downstream daemons see only IPv4 loopback connections.
#
# Flow for LAN client (IPv4 or IPv6) --> HTTPS:
#
#   LAN client (%%INT_NET4%% or %%INT_NET6%%)
#         |
#         | PF divert-to lo port 8443  [R]
#         v
#   SSLproxy (::1:8443 / 127.0.0.1:8443)  --  TLS decryption
#         |
#         | forwards decrypted stream to lo:8080 (e2guardian)
#         v
#   PF divert-packet port 700  [D]  --  intercepts 'to port 8080'
#         v
#   Snort IPS  --  deep packet inspection, rejects or reinjects
#         |
#         v
#   e2guardian (127.0.0.1:8080)  --  content filtering
#         |
#         v
#   NAT44/NAT66/NAT64 match out %%EXT_IF%%
#         |
#         v
#   pass out %%EXT_IF%%
#
# Key implementation note:
#   Each protocol divert uses two rules  --  inet and inet6  --  both with
#   divert-to lo. The inet/inet6 qualifier is required: without it PF
#   resolves lo to ::1 only, generating only IPv6 divert rules and
#   silently leaving IPv4 clients unintercepted. With the qualifier,
#   PF resolves lo to 127.0.0.1 for inet and ::1 for inet6.
#
# =============================================================================
# PACKET TRAVERSAL ORDER
# =============================================================================
#
#  [A] Global settings, variables, tables
#  [B] Logging  --  real interfaces only, NOT loopback
#  [C] Default deny
#  [D] Loopback  --  Snort IPS divert + general pass (no set skip on lo)
#  [E] FTP proxy anchor
#  [F] Scrub  --  per-interface, per-family
#  [G] NDP/MLD exemptions (MUST precede bogon blocks)
#  [H] Loopback source spoofing blocks
#  [H2] LAN antispoofing
#  [I] Bogon blocks  --  IPv4 and IPv6 on WAN ingress
#  [J] Additional spoofing blocks (link-local, Teredo, 6to4)
#  [K] Dynamic blocklists (snort_block, blocklist, bogons)
#  [L] Addons anchor
#  [M] User and daemon isolation
#  [N] ICMPv4 and ICMPv6 (RFC 4890)
#  [O] DHCPv4 and DHCPv6
#  [P] SSH
#  [Q] DNS
#  [R] *** APPLICATION PROXY DIVERTS *** --  MUST precede broad LAN pass
#  [S] Broad LAN pass  --  after diverts so quick divert rules fire first
#  [T] WAN ping  --  inbound echo to ($ext_if), any source
#  [U] NAT44, NAT66, NAT64
#  [V] Outbound general
#  [W] Application pass rules (web UI, FCM, IM return, SOCKS)
#
# =============================================================================
# NAT STRATEGY
# =============================================================================
#
# NAT44  --  IPv4 LAN clients masqueraded behind WAN IPv4 address
# NAT66  --  IPv6 ULA LAN clients masqueraded behind WAN IPv6 GUA
# NAT64  --  IPv6 LAN clients reaching IPv4-only internet destinations
#          via DNS64 (Unbound) + PF af-to translation
#
# =============================================================================
# NAT66 PMTUD LIMITATION
# =============================================================================
#
# The OpenBSD kernel does not generate ICMPv6 Packet Too Big (type 2) for
# oversized forwarded packets through NAT66. The kernel's route MTU cache
# marks the path as DONE and suppresses PTB generation. This is a known,
# documented limitation  --  not a bug, not configurable.
#
# Mitigation is source-based:
#   - rad(8) advertises confirmed wire MTU via RA MTU option. SLAAC clients
#     self-limit and never construct packets larger than the gateway can forward.
#   - PF scrub max-mss clamps TCP MSS on ingress for all clients regardless
#     of their local MTU configuration.
#   - tn-mtu-probe.sh discovers path MTU at boot and writes confirmed values
#     to /etc/tn-interfaces for this ruleset, rad.conf, and hostname.if.
#
# =============================================================================
# MTU / MSS
# =============================================================================
#
# Wire MTU and MSS values are determined at boot by tn-mtu-probe.sh.
# MSS derivation:
#   IPv6 MSS = wire_mtu - 40 (IPv6 header) - 20 (TCP header) = wire_mtu - 60
#   IPv4 MSS = wire_mtu - 20 (IPv4 header) - 20 (TCP header) = wire_mtu - 40
#
# Current confirmed values (updated by tn-mtu-probe.sh via /etc/tn-interfaces):
PF_MAX_MSS_EXT_IF=1400
PF_MAX_MSS_INT_IF=1400
PF_MAX_MSS4_EXT_IF=1420
PF_MAX_MSS4_INT_IF=1420
#
# =============================================================================
# PROXY INSPECTION COVERAGE
# =============================================================================
#
# Protocol    IPv4        IPv6        Notes
# -----------------------------------------------------------------------
# HTTP        SSLproxy    SSLproxy    Full inspection both families
# HTTPS       SSLproxy    SSLproxy    TLS decryption both families
# POP3        SSLproxy    SSLproxy    Via SSLproxy -> p3scan (lo:8110)
# POP3S       SSLproxy    SSLproxy    Via SSLproxy -> p3scan (lo:8110)
# IMAP/S      SSLproxy    SSLproxy    Via SSLproxy -> p3scan (lo:8993->lo:8110)
# SMTP        SSLproxy    SSLproxy    Via SSLproxy -> smtp-gated (lo:9199)
# SMTPS       SSLproxy    SSLproxy    Via SSLproxy -> smtp-gated (lo:9199)
# SUBMISSION  SSLproxy    SSLproxy    Via SSLproxy -> smtp-gated (lo:9199)
# FTP         ftp-proxy   ftp-proxy   Dual-stack via divert-to lo
# IM/IRC      imspector   PASS*       imspector IPv4 only (no IPv6 socket)
# SOCKS       Dante       Dante       IPv6 via %%INT_IP6%%:1080 listener
# DNS         Unbound     Unbound     Dual-stack, DNS64 for NAT64
# SSH         direct      direct      Management only, LAN restricted
#
# * IPv6 IM: explicit quick pass at [R] -- gap is a known imspector
#   limitation, not a ruleset oversight. Block if IM policy requires it.
# =============================================================================

# ======================================================================
# [A] PERFORMANCE SETTINGS
# ======================================================================
set limit states        200000
set limit src-nodes     100000
set limit frags         32768
set limit tables        1000
set limit table-entries 1000000

set optimization normal

# Timeouts for busy deployments (schools, libraries, press outlets)
set timeout tcp.established 86400
set timeout tcp.closing      60
set timeout tcp.finwait      30
set timeout tcp.closed       10

# ======================================================================
# [A] VARIABLE DECLARATION
# ======================================================================
set loginterface pflog1

ext_if = "%%EXT_IF%%"
int_if = "%%INT_IF%%"

int_net4 = "%%INT_NET4%%"
int_net6 = "%%INT_NET6%%"

ssh_port  = 22
im_ports  = "{ 1863, 5190, 5050, 6667 }"
fb_ports  = "{ 5228, 5229, 5230 }"
nat64_pfx = "%%NAT64_PFX%%"

# NAT64 representation of int_if IPv4 address  --  populated by TN_NET_SET.sh
nat64_int_ip4 = "%%NAT64_INT_IP4%%"

# ======================================================================
# [A] TABLE DEFINITIONS
# ======================================================================
table <lan_nets>  { %%INT_NET4%%, %%INT_NET6%% }
table <blocklist> persist
table <bogons>    persist
table <snort_block> persist

# ======================================================================
# [B] LOGGING
# Log only real interface traffic  --  loopback is internal proxy relay.
# Logging loopback produces enormous volume with zero security value.
# pflog0 receives blocks automatically from PF regardless of this rule.
# ======================================================================
match log (to pflog1) on { $ext_if $int_if }

# ======================================================================
# [C] DEFAULT DENY
#
# block return on real interfaces: sends TCP RST / ICMP unreachable.
# block drop:   silent discard for spoofed/bogon sources (used selectively).
#
# CRITICAL: loopback is NOT included in the default deny.
# After Snort reinjects a diverted packet on loopback it must pass freely.
# A global 'block return all' catches reinjected packets and requires
# explicit pass rules on lo  --  which break divert-packet for large files
# (HTTP PUT method). This follows Soner Tari's UTMFW reference implementation.
# ======================================================================
block return on { $ext_if $int_if } all

# ======================================================================
# [D] LOOPBACK
#
# Loopback is NOT skipped (no set skip on lo). PF must see loopback
# traffic so the Snort IPS divert-packet rule fires on proxy re-originated
# flows. Without this, the entire inspection chain is bypassed.
#
# Snort IPS divert:
#   SSLproxy forwards decrypted flows to these upstream daemon ports:
#     8080  --  HTTP/HTTPS  (--> e2guardian)
#     8110  --  POP3/POP3S/IMAPS  (--> p3scan)
#     9199  --  SMTP/SMTPS/SUBMISSION  (--> smtp-gated)
#
#   The divert-packet rule intercepts traffic destined for these upstream
#   ports before it reaches the daemon, sends it to Snort's ipfw DAQ on
#   port 700. Snort inspects and reinjects clean traffic.
#
# CRITICAL rules from UTMFW reference implementation:
#   1. No 'pass on lo all'  --  breaks divert-packet for HTTP PUT (large files)
#   2. No 'block return all' at [C]  --  blocks reinjected packets on lo
#   3. No separate match scrub on lo  --  causes PF to implicitly add flags S/SA
#      which breaks matching on established flows (only SYN would match)
#   4. No 'flags any' or 'no state' needed  --  without competing state or
#      scrub rules, PF evaluates divert-packet correctly for all packets
#
# Note: loopback traffic is not logged (match log covers ext_if/int_if only).
# ======================================================================

# Snort IPS divert  --  intercept traffic destined for upstream proxy daemons.
# Ports are SSLproxy upstream targets, not SSLproxy listen ports.
pass in quick on lo proto tcp to port { 8080 8110 9199 } divert-packet port 700

# ======================================================================
# [E] FTP PROXY
# ftp-proxy handles active-mode FTP data channel rules dynamically.
# Dual-stack: inet and inet6 rules both divert-to lo.
# ======================================================================
anchor "ftp-proxy/*"

pass in quick on $int_if inet  proto tcp from $int_net4 to !$int_if port 21 \
    divert-to lo port 8021
pass in quick on $int_if inet6 proto tcp from $int_net6 to !$int_if port 21 \
    divert-to lo port 8021

# ======================================================================
# [F] TRAFFIC NORMALISATION (scrub)
#
# Per-interface, per-family  --  more precise than global scrub.
#
# IPv4: no-df clears Don't Fragment bit (prevents PMTUD blackholes).
#       random-id replaces predictable IP-ID (prevents OS fingerprinting).
#       max-mss clamps TCP MSS after NAT.
#
# IPv6: max-mss only. no-df and random-id are IPv4-only options  --
#       IPv6 has no DF bit and no IP identification field.
#
# MSS values populated by tn-mtu-probe.sh via /etc/tn-interfaces.
# ======================================================================
match in on $ext_if inet6 scrub (max-mss $PF_MAX_MSS_EXT_IF)
match in on $int_if inet6 scrub (max-mss $PF_MAX_MSS_INT_IF)

match in on $ext_if inet  scrub (no-df random-id max-mss $PF_MAX_MSS4_EXT_IF)
match in on $int_if inet  scrub (no-df random-id max-mss $PF_MAX_MSS4_INT_IF)

# ======================================================================
# [G] NDP AND MLD EXEMPTIONS
#
# MUST precede bogon blocks. NDP uses fe80::/10 (link-local) and MLD
# uses ff00::/8 (multicast) as source addresses  --  both caught by bogon
# blocks below. quick pass rules here preempt the bogon blocks.
# ======================================================================

# NDP on WAN  --  router solicitation/advertisement, neighbour discovery
pass in  quick on $ext_if inet6 proto icmp6 from fe80::/10 \
    icmp6-type { neighbrsol neighbradv routeradv } keep state
pass out quick on $ext_if inet6 proto icmp6 to fe80::/10 \
    icmp6-type { neighbrsol neighbradv routersol } keep state

# MLD on WAN  --  multicast group management
pass in  quick on $ext_if inet6 proto icmp6 \
    icmp6-type { 130 131 132 143 } keep state
pass out quick on $ext_if inet6 proto icmp6 \
    icmp6-type { 130 131 132 143 } keep state

# ======================================================================
# [H] LOOPBACK SOURCE BLOCKS
# Packets claiming loopback sources on real interfaces are spoofed.
# Silent drop  --  the claimed source is unreachable.
# ======================================================================
block drop in quick on !lo inet  from 127.0.0.0/8 to any
block drop in quick on !lo inet6 from ::1 to any
block drop in quick inet6 from ::1 to any

# ======================================================================
# [H2] LAN ANTISPOOFING
# Block packets on int_if whose source is outside the legitimate LAN
# subnets. Prevents compromised LAN hosts from forging source addresses
# to bypass source-based firewall rules.
# NDP fe80::/10 traffic is already passed quick at [G]  --  unaffected.
# ======================================================================
block drop in quick on $int_if inet  from !$int_net4 to any
block drop in quick on $int_if inet6 from !$int_net6 to any

# ======================================================================
# [I] BOGON BLOCKS
# ======================================================================

# IPv4 bogon block on WAN ingress
# NOTE: RFC1918 ranges absent  --  lab WAN uses 192.168.122.0/24.
# PRODUCTION: restore 10/8, 172.16/12, 192.168/16 before deployment.
block drop in quick on $ext_if inet from {             \
    0.0.0.0/8, 100.64.0.0/10,                         \
    127.0.0.0/8, 169.254.0.0/16,                      \
    192.0.0.0/24, 192.0.2.0/24,                       \
    198.18.0.0/15, 198.51.100.0/24, 203.0.113.0/24,   \
    240.0.0.0/4, 255.255.255.255/32 } to any

# IPv6 bogon block on WAN ingress
# NOTE: fc00::/7 absent  --  lab upstream uses fd00:cafe:1::1 (ULA).
# PRODUCTION: restore fc00::/7 before deployment with real ISP GUA on WAN.
block drop in quick on $ext_if inet6 from {            \
    ::1/128, ::/128,                                   \
    ::ffff:0:0/96,                                     \
    100::/64,                                          \
    2001::/32,                                         \
    2001:2::/48,                                       \
    2001:db8::/32,                                     \
    2001:10::/28,                                      \
    fec0::/10,                                         \
    ff00::/8 } to any

# ======================================================================
# [J] ADDITIONAL SPOOFING BLOCKS
# ======================================================================

# Link-local arriving on LAN with non-link-local destination  --  spoofed
block drop in quick on $int_if inet6 from fe80::/10 to !fe80::/10

# Teredo and 6to4  --  create unmonitored IPv6 paths bypassing the firewall.
# Native IPv6 via NAT66/NAT64 makes these unnecessary and unsafe.
block drop in quick on $ext_if proto udp to port 3544
block drop in quick on $ext_if proto 41

# ======================================================================
# [K] DYNAMIC BLOCKLISTS
# Populated at runtime by Snort, pfBlocker, reputation feeds.
# block drop  --  silent discard, no RST/ICMP to known-bad sources.
# Tables accept both IPv4 and IPv6 entries natively.
# ======================================================================
block drop quick from <snort_block>
block drop quick from <blocklist>
block drop quick on { $ext_if $int_if } from <bogons>

# ======================================================================
# [L] ADDONS ANCHOR  --  user-managed transient rules
# Load:  pfctl -a addons -f /etc/pf/pf-addons.conf
# Flush: pfctl -a addons -F all
# Show:  pfctl -a addons -sr
# ======================================================================
anchor "addons"

# ======================================================================
# [M] USER AND DAEMON ISOLATION
# ======================================================================

# Block remote X11
block return in on !lo proto tcp to port 6000:6010

# Ports build user  --  no outbound internet
block return out proto { tcp udp } user _pbuild

# Proxy daemons receive traffic via PF divert only  --  no direct connections.
# block drop on any covers all interfaces, both families.
block drop on any proto { tcp udp } user { _e2guardian _p3scan _smtp-gated }

# Dante receives traffic via SOCKS listener rules at [W] only.
block drop in on any proto { tcp udp } user _sockd

# Snort listens only  --  no outbound traffic generation.
block drop out on any proto { tcp udp } user _snort

# ======================================================================
# [N] ICMPv4
# unreach and timex must remain unrestricted for PMTUD and traceroute.
# echoreq inbound on WAN is handled separately at [T].
# ======================================================================
pass in  inet proto icmp icmp-type { unreach timex } keep state
pass out inet proto icmp                              keep state

# ======================================================================
# [N] ICMPv6  --  RFC 4890 compliance
#
# Group 1  --  Packet Too Big (type 2):
#   Stateless  --  no associated connection state. quick, no keep state.
#
# Group 2  --  Error messages (types 1, 3, 4):
#   Stateful  --  correspond to existing flows.
#
# Group 3  --  Informational (NDP, MLD, echo):
#   NDP and MLD on WAN already handled at [G].
#   echoreq inbound on WAN is handled at [T].
# ======================================================================

# Group 1: Packet Too Big  --  stateless, quick
pass in  quick on { $ext_if $int_if } inet6 proto icmp6 icmp6-type toobig
pass out quick on { $ext_if $int_if } inet6 proto icmp6 icmp6-type toobig

# Group 2: Error messages  --  stateful
pass in  on $ext_if inet6 proto icmp6 icmp6-type { unreach timex paramprob } keep state
pass out on $ext_if inet6 proto icmp6 icmp6-type { unreach timex paramprob } keep state
pass in  on $int_if inet6 proto icmp6 icmp6-type { unreach timex paramprob } keep state
pass out on $int_if inet6 proto icmp6 icmp6-type { unreach timex paramprob } keep state

# Group 3: Informational

# Echo on WAN outbound  --  unrestricted. Inbound handled at [T].
pass out on $ext_if inet6 proto icmp6 \
    icmp6-type { echoreq echorep } keep state

# NDP on LAN  --  mandatory for IPv6 address resolution
pass in  on $int_if inet6 proto icmp6 \
    icmp6-type { neighbrsol neighbradv routersol } keep state
pass out on $int_if inet6 proto icmp6 \
    icmp6-type { neighbradv routeradv } keep state

# MLD on LAN  --  mandatory for IPv6 multicast group management
pass in  on $int_if inet6 proto icmp6 icmp6-type { 130 131 132 143 } keep state
pass out on $int_if inet6 proto icmp6 icmp6-type { 130 131 132 143 } keep state

# Echo on LAN  --  full allow
pass in  on $int_if inet6 proto icmp6 from <lan_nets> \
    icmp6-type { echoreq echorep } keep state
pass out on $int_if inet6 proto icmp6 to <lan_nets> \
    icmp6-type { echoreq echorep } keep state

# ======================================================================
# [O] DHCPv4
# DHCP clients send from port 68 to server unicast or broadcast.
# ======================================================================
pass in on $int_if inet proto udp from any port 68 to ($int_if)    port 67 keep state
pass in on $int_if inet proto udp from any port 68 to 255.255.255.255 port 67 keep state

# ======================================================================
# [O] DHCPv6
# WAN: router acts as DHCPv6 client (dhcp6leased) requesting PD.
# LAN: rad(8) responds to DHCPv6 solicitations from clients.
# Solicitation uses multicast ff02::1:2  --  no state (multicast has no
# predictable return path for PF to track).
# ======================================================================
pass out on $ext_if inet6 proto udp from fe80::/10 to ff02::1:2 port 547 no state
pass in  on $ext_if inet6 proto udp from fe80::/10 port 547 \
    to fe80::/10 port 546 keep state

pass in  on $int_if inet6 proto udp from fe80::/10 to ff02::1:2 port 547 keep state
pass out on $int_if inet6 proto udp to fe80::/10 port 546 keep state

# ======================================================================
# [P] SSH
# flags S/SA prevents state table exhaustion from SYN floods.
# max-src-conn/rate limits authentication attempts per source.
# Offending IPs added to blocklist table and states flushed globally.
# ======================================================================
pass in quick on { $int_if $ext_if } proto tcp \
    to { ($int_if) ($ext_if) } port $ssh_port \
    flags S/SA keep state \
    (max-src-conn 10, max-src-conn-rate 5/30, \
     overload <blocklist> flush global)

# ======================================================================
# [Q] DNS
# LAN clients query local Unbound only  --  cannot reach external resolvers.
# Unbound binds both IPv4 and IPv6 on the LAN interface.
# Gateway processes query Unbound on loopback (no state  --  local only).
# ======================================================================
pass in on $int_if inet  proto { udp tcp } from $int_net4 to ($int_if) port 53 keep state
pass in on $int_if inet6 proto { udp tcp } from $int_net6 to ($int_if) port 53 keep state

pass out on $ext_if inet  proto { udp tcp } from ($ext_if) to any port 53 keep state
pass out on $ext_if inet6 proto { udp tcp } to any port 53 keep state

# Local processes querying Unbound on loopback
pass on lo inet  proto { udp tcp } to 127.0.0.1 port 53 no state
pass on lo inet6 proto { udp tcp } to ::1       port 53 no state

# ======================================================================
# [R] APPLICATION PROXY DIVERTS
#
# CRITICAL: These MUST appear before the broad LAN pass rule [S].
# All rules use quick  --  they intercept matching traffic before [S] fires.
#
# Each protocol has two rules  --  inet and inet6  --  with divert-to lo.
# The inet/inet6 qualifier is required: without it, divert-to lo resolves
# to ::1 only (IPv6 addresses on lo take precedence), generating only
# inet6 rules and leaving IPv4 clients with no divert rule at all.
# With the qualifier, PF resolves lo to 127.0.0.1 for inet rules and
# ::1 for inet6 rules correctly.
#
# to !$int_if excludes all %%INT_IF%% addresses (both IPv4 and IPv6 including
# link-local), preventing the router's own traffic from being diverted.
# ======================================================================

# --- SSLproxy  --  HTTP ---
# SSLproxy listens on 127.0.0.1:8081 and ::1:8081, forwards to e2guardian up:8080
pass in quick on $int_if inet  proto tcp from $int_net4 to !$int_if port www \
    divert-to lo port 8081
pass in quick on $int_if inet6 proto tcp from $int_net6 to !$int_if port www \
    divert-to lo port 8081

# --- SSLproxy  --  HTTPS ---
# SSLproxy listens on 127.0.0.1:8443 and ::1:8443, forwards to e2guardian up:8080
pass in quick on $int_if inet  proto tcp from $int_net4 to !$int_if port https \
    divert-to lo port 8443
pass in quick on $int_if inet6 proto tcp from $int_net6 to !$int_if port https \
    divert-to lo port 8443

# --- SSLproxy --> p3scan  --  POP3 ---
# SSLproxy listens on 127.0.0.1:8994 and ::1:8994, forwards to p3scan up:8110
pass in quick on $int_if inet  proto tcp from $int_net4 to !$int_if port pop3 \
    divert-to lo port 8994
pass in quick on $int_if inet6 proto tcp from $int_net6 to !$int_if port pop3 \
    divert-to lo port 8994

# --- SSLproxy --> p3scan  --  POP3S ---
# SSLproxy listens on 127.0.0.1:8995 and ::1:8995, forwards to p3scan up:8110
pass in quick on $int_if inet  proto tcp from $int_net4 to !$int_if port pop3s \
    divert-to lo port 8995
pass in quick on $int_if inet6 proto tcp from $int_net6 to !$int_if port pop3s \
    divert-to lo port 8995

# --- SSLproxy --> p3scan  --  IMAPS ---
# SSLproxy listens on 127.0.0.1:8993 and ::1:8993, forwards to p3scan up:8110.
# Snort divert-packet at [D] fires on the decrypted stream at up:8110.
# Dual-stack  --  mirrors all other mail protocol coverage.
pass in quick on $int_if inet  proto tcp from $int_net4 to !$int_if port imaps \
    divert-to lo port 8993
pass in quick on $int_if inet6 proto tcp from $int_net6 to !$int_if port imaps \
    divert-to lo port 8993

# --- SSLproxy --> smtp-gated  --  SMTP ---
# SSLproxy listens on 127.0.0.1:8464 and ::1:8464, forwards to smtp-gated up:9199
pass in quick on $int_if inet  proto tcp from $int_net4 to !$int_if port smtp \
    divert-to lo port 8464
pass in quick on $int_if inet6 proto tcp from $int_net6 to !$int_if port smtp \
    divert-to lo port 8464

# --- SSLproxy --> smtp-gated  --  SMTPS ---
# SSLproxy listens on 127.0.0.1:8465 and ::1:8465, forwards to smtp-gated up:9199
pass in quick on $int_if inet  proto tcp from $int_net4 to !$int_if port 465 \
    divert-to lo port 8465
pass in quick on $int_if inet6 proto tcp from $int_net6 to !$int_if port 465 \
    divert-to lo port 8465

# --- SSLproxy --> smtp-gated  --  SUBMISSION ---
# SSLproxy listens on 127.0.0.1:8466 and ::1:8466, forwards to smtp-gated up:9199
pass in quick on $int_if inet  proto tcp from $int_net4 to !$int_if port submission \
    divert-to lo port 8466
pass in quick on $int_if inet6 proto tcp from $int_net6 to !$int_if port submission \
    divert-to lo port 8466

# --- imspector -- Instant Messenger ---
# imspector binds IPv4 wildcard only -- no IPv6 socket support.
# IPv4 LAN clients only. IPv6 IM traffic bypasses imspector.
pass in quick on $int_if inet proto tcp from $int_net4 to !$int_if \
    port $im_ports divert-to lo port 16667

# Allow IPv6 IM traffic to pass through, but do not inspect it
pass in quick on $int_if inet6 proto tcp from $int_net6 to any port $im_ports

# --- NAT64 local SOCKS ---
# Intercept BEFORE the NAT64 af-to rule at [U] to keep the connection
# IPv6 end-to-end. %%NAT64_INT_IP4%% is the NAT64 representation of
# %%INT_IP4%% (the int_if address). divert-to %%INT_IP6%% sends directly
# to Dante's IPv6 listener  --  no af-to needed, no return-path issue.
# Dante ACL must permit %%INT_NET6%%
pass in quick on $int_if inet6 proto tcp \
    from $int_net6 to $nat64_int_ip4 port 1080 \
    divert-to %%INT_IP6%% port 1080
pass in quick on $int_if inet6 proto udp \
    from $int_net6 to $nat64_int_ip4 port 1080 \
    divert-to %%INT_IP6%% port 1080

# ======================================================================
# [S] BROAD LAN PASS
# Placed AFTER all divert rules so quick divert rules above fire first.
# Covers all remaining LAN traffic not matched by earlier quick rules:
# router-addressed packets (web UI already limited at [W]), forwarded
# traffic to WAN, and any protocol not explicitly inspected above.
# ======================================================================
pass in on $int_if from <lan_nets> keep state

# ======================================================================
# [T] WAN PING
#
# Inbound echo requests to ($ext_if)  --  any source permitted.
# ($ext_if) resolves the current WAN address dynamically, correct for
# both DHCP-assigned IPv4 and SLAAC/DHCPv6-PD-assigned IPv6.
# No source restriction  --  monitor hosts are on the same WAN segment
# and are indistinguishable from any other external host at this layer.
#
# echoreq inbound removed from [N] ICMPv4 and [N] ICMPv6  --  all WAN
# echo inbound is consolidated here.
# ======================================================================
pass in on $ext_if inet  proto icmp  to ($ext_if) icmp-type  echoreq keep state
pass in on $ext_if inet6 proto icmp6 to ($ext_if) icmp6-type echoreq keep state

# ======================================================================
# [U] NAT44  --  IPv4 masquerade
# ($ext_if) resolves current WAN address at translation time  --  correct
# for DHCP-assigned addresses without requiring ruleset reload.
# ======================================================================
match out on $ext_if inet from $int_net4 to any nat-to ($ext_if)

# ======================================================================
# [U] NAT66  --  IPv6 masquerade (ULA behind WAN GUA)
#
# LAN clients use ULA (%%INT_NET6%%)  --  not globally routable.
# Masqueraded behind WAN GUA (SLAAC or DHCPv6-PD assigned).
#
# PRODUCTION NOTE: If ISP delegates a DHCPv6-PD prefix, assign it to
# int_if, advertise via rad(8), and remove this match rule. Native
# routing is always preferred over NAT66. The NAT66 PMTUD limitation
# documented at the top of this file does not apply when using native
# prefix delegation.
# ======================================================================
match out on $ext_if inet6 from $int_net6 to any nat-to ($ext_if)

# NAT66 translated source = WAN GUA  --  pass outbound.
# keep state handles the return path automatically.
pass out quick on $ext_if inet6 from ($ext_if) to any keep state

# ======================================================================
# [U] NAT64  --  IPv6 clients reaching IPv4-only internet
#
# Unbound DNS64 synthesises AAAA records under %%NAT64_PFX%% for
# IPv4-only destinations. Client sends IPv6 to 64:ff9b::x.x.x.x.
# PF af-to translates IPv6 -> IPv4, extracts destination from lower
# 32 bits of the NAT64 address, forwards as IPv4. NAT44 masquerades
# the outbound packet.
#
# Constraints  --  any of these break NAT64:
#   proto list, flags, quick, table for prefix
#
# Prerequisite static route (in hostname.%%INT_IF%%):
#   route add -inet6 %%NAT64_PFX%% %%INT_IP6%%
#
# NAT64 local SOCKS is intercepted at [R] before this rule fires.
# ======================================================================
pass in on $int_if inet6 from $int_net6 to $nat64_pfx \
    af-to inet from ($ext_if) keep state

# Explicit egress for NAT64-translated IPv4 packets
pass out on $ext_if inet from ($ext_if) to any keep state

# ======================================================================
# [V] OUTBOUND GENERAL
# Safety net  --  all quick/specific rules above have already fired.
# Covers gateway-originated traffic and anything not matched earlier.
# ======================================================================
pass out on $int_if from $int_if:network to any keep state
pass out on $ext_if from any             to any keep state

# ======================================================================
# [W] APPLICATION PASS RULES
# ======================================================================

# Router web UI
# Traffic to ($int_if) is not caught by SSLproxy diverts at [R] which
# use 'to !$int_if'. It reaches httpd directly on the gateway.
# IPv4 only  --  IPv6 management not exposed by default.
pass in on $int_if proto tcp from $int_net4 to ($int_if) port { www https }

# Firebase Cloud Messaging  --  Android/iOS push notifications
pass in on $int_if proto tcp from $int_net4 to port $fb_ports

# Instant Messaging  --  outbound after imspector, return path on WAN
pass out on $ext_if proto tcp from ($ext_if) to port $im_ports
pass in  on $ext_if proto tcp from port $im_ports to ($ext_if)

# SOCKS  --  circuit-level gateway, opt-in client proxy bypass
# Traffic via Dante exits through NAT44/NAT66 without SSLproxy inspection.
# IPv4: clients address %%INT_IP4%%:1080 directly
# IPv6: clients address %%INT_IP6%%:1080 directly
# Security: pf blocklists + Dante ACL + Dante audit log
pass in on $int_if proto { tcp udp } from $int_net4 to port socks
pass in on $int_if inet6 proto { tcp udp } from $int_net6 to ($int_if) port 1080 keep state
