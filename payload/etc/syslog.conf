#       $OpenBSD: syslog.conf,v 1.21 2021/10/13 20:34:03 sthen Exp $
#

# ftp-proxy
!!ftp-proxy
*.*                                                     /var/www/htdocs/tn/data/logs/ftp-proxy/ftp-proxy.log
!*

# httpd (logs via daemon facility)
!!httpd
*.notice                                                /var/www/htdocs/tn/data/logs/httpd/httpd_error.log
*.info                                                  /var/www/htdocs/tn/data/logs/httpd/httpd_access.log
*.debug                                                 /dev/null
!*

# DHCPD logs
!!dhcpd
*.*                                                     /var/www/htdocs/tn/data/logs/dhcpd/dhcpd.log
!*

# unbound isolated logging
!!unbound
*.*                                                     /var/www/htdocs/tn/data/logs/unbound/unbound.log
!*

# rad isolated logging
!!rad
*.*                                                     /var/www/htdocs/tn/data/logs/rad/rad.log
!*

# Collectd logs
!!collectd
*.*                                                     /var/www/htdocs/tn/data/logs/collectd/collectd.log
!*

# SSLproxy
!!sslproxy
local1.*                                                /var/www/htdocs/tn/data/logs/sslproxy/sslproxy_connect.log
*.*                                                     /var/www/htdocs/tn/data/logs/sslproxy/sslproxy.log
!*

# sockd
!!sockd
*.*                                                     /var/www/htdocs/tn/data/logs/sockd/sockd.log
!*

# p3scan
!!p3scan
*.*                                                     /var/www/htdocs/tn/data/logs/p3scan/p3scan.log
!*

# smtp-gated
!!smtp-gated
*.*                                                     /var/www/htdocs/tn/data/logs/smtp-gated/smtp-gated.log
!*

# spamd
!!spamd
*.*                                                     /var/www/htdocs/tn/data/logs/spamd/spamd.log
!*

# snort IDS
!snort_ids
*.*                                                     /var/www/htdocs/tn/data/logs/snort/snort.log
!*

# snort IPS   
!snort_ips
*.*                                                     /var/www/htdocs/tn/data/logs/snort/snortinline.log
!*


# snortsentry
!!snortsentry
*.*                                                     /var/www/htdocs/tn/data/logs/snortsentry/snortsentry.log
!*

# e2guardian
!!e2guardian
local0.*                                                /var/www/htdocs/tn/data/logs/e2guardian/access.log
*.*                                                     /var/www/htdocs/tn/data/logs/e2guardian/e2guardian.log
!*

# pmacct
!!pmacctd
*.*                                                     /var/www/htdocs/tn/data/logs/pmacct/pmacct.log
!*

# imspector
!!imspector
*.*                                                     /var/www/htdocs/tn/data/logs/imspector/imspector.log
!*

# doas
!doas
*.*                                                     /var/www/htdocs/tn/data/logs/doas/doas.log
!*

# Catch remaining daemon logs (after program-specific rules)
# Exclude programs with dedicated logs from catch-all rules

#*.notice;auth,authpriv,cron,ftp,kern,lpr,mail,user,daemon.none /var/www/htdocs/tn/data/logs/system/messages
#*.notice;auth,authpriv,cron,ftp,kern,lpr,mail,user.none /var/www/htdocs/tn/data/logs/system/messages
*.notice;daemon,auth,authpriv,cron,ftp,kern,lpr,mail,user.none /var/www/htdocs/tn/data/logs/system/messages

kern.debug;syslog,user.info                             /var/www/htdocs/tn/data/logs/system/messages
auth.info                                               /var/log/authlog
authpriv.debug                                          /var/log/secure
cron.info                                               /var/cron/log
ftp.info                                                /var/log/xferlog
lpr.debug                                               /var/log/lpd-errs
mail.info                                               /var/log/maillog

daemon.info                                             /var/www/htdocs/tn/data/logs/system/daemon
